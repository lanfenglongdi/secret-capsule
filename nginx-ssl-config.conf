# Nginx SSL 配置(由 Certbot 自动生成后的预期配置)
# 此文件作为参考,实际配置将由 Certbot 自动完成

server {
    listen 80;
    server_name mtsc.site www.mtsc.site;

    # Certbot 会自动添加以下行来验证域名所有权
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HTTP 自动跳转到 HTTPS(Certbot 会自动配置)
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mtsc.site www.mtsc.site;

    # SSL 证书路径(由 Certbot 自动配置)
    # ssl_certificate /etc/letsencrypt/live/mtsc.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mtsc.site/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/secret-capsule-access.log;
    error_log /var/log/nginx/secret-capsule-error.log;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://localhost:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}
